name: Kemaskini M3U8 Setiap 3 Jam

on:
  schedule:
    # Menggunakan format Cron untuk jalankan skrip setiap 3 jam
    - cron: '0 */3 * * *'
  workflow_dispatch: # Membolehkan anda jalankan secara manual kalau nak test

jobs:
  update-m3u8:
    runs-on: ubuntu-latest

    steps:
    # 1. Ambil kod dari repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Jalankan skrip bash tadi
    - name: Jalankan skrip pengambil M3U8
      run: bash get_stream.sh

    # 3. Commit dan Push fail stream.m3u8 yang baru kembali ke GitHub
    - name: Commit dan Push jika ada perubahan
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add stream.m3u8
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update stream.m3u8 [skip ci]" && git push)
        
